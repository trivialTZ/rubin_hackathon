# Phase-1 remote broker inventory
# semantic_type values: probability | binary_score | context_class | crossmatch_tag | heuristic_class

brokers:

  alerce:
    phase: 1
    access: remote
    status: active
    public: true
    credentials_required: false
    client: alerce
    base_url: https://api.alerce.online/ztf/v1
    semantic_type: probability
    event_scope: object_snapshot
    temporal_exactness: latest_object_unsafe
    historical_trainability: live_only_until_epoch_safe
    classifier_version_expected: true
    output_fields:
      - classifier: ALeRCE stamp classifier
        field: probabilities
        type: probability
        classes: [AGN, SN, VS, asteroid, bogus]
      - classifier: ALeRCE light curve classifier
        field: probabilities
        type: probability
        classes: [SNIa, SNIbc, SNII, SLSN, AGN, VS, asteroid, bogus]
    notes: >
      Explicit multiclass posteriors from both stamp and LC classifiers.
      Historical backfilled object snapshots are unsafe for epoch-level trust
      training unless they were archived contemporaneously or rerun locally.

  fink:
    phase: 1
    access: remote
    status: active
    public: true
    credentials_required: false  # public REST; livestream needs login
    client: fink-client (REST mode)
    base_url: https://fink-portal.org
    semantic_type: mixed  # probability scores + heuristic class string
    event_scope: alert
    temporal_exactness: exact_alert
    historical_trainability: trainable
    classifier_version_expected: false
    output_fields:
      - field: rf_snia_vs_nonia
        type: probability
        description: P(SN Ia | not non-Ia SN)
      - field: snn_snia_vs_nonia
        type: probability
        description: SuperNNova P(SN Ia)
      - field: snn_sn_vs_all
        type: probability
        description: SuperNNova P(SN | all)
      - field: rf_kn_vs_nonkn
        type: probability
        description: P(kilonova)
      - field: mulens_class_1
        type: binary_score
        description: microlensing ML score
      - field: nalerthist
        type: heuristic_class
        description: number of previous alerts (activity proxy)
      - field: finkclass
        type: heuristic_class
        description: top-level Fink classification string (not a posterior)
    notes: >
      Richest score surface of phase-1 brokers. finkclass must NOT be treated
      as a calibrated posterior — it is a heuristic routing label.

  lasair:
    phase: 1
    access: remote
    status: active_with_caveats
    public: true
    credentials_required: true  # token via lasair-ztf.lsst.ac.uk
    client: lasair
    base_url: https://lasair-ztf.lsst.ac.uk/api
    semantic_type: context_class
    event_scope: static_context
    temporal_exactness: static_safe
    historical_trainability: context_only
    classifier_version_expected: false
    output_fields:
      - field: sherlock_classification
        type: crossmatch_tag
        description: >
          Contextual host/environment label from Sherlock
          (e.g. SN, NT, AGN, CV, BS, ORPHAN). Not a calibrated posterior.
    fixture_fallback: fixtures/raw/lasair/sample_object.json
    notes: >
      Sherlock output is a crossmatch-based context label, not a classifier
      posterior. Treat as a categorical feature, not a probability.

  pitt_google:
    phase: 1
    access: remote
    status: active
    public: true
    credentials_required: true  # Google Cloud service account or ADC
    client: pittgoogle-client (BigQuery)
    base_url: bigquery://pitt-alert-broker.lsst.supernnova
    semantic_type: probability
    event_scope: alert
    temporal_exactness: exact_alert
    historical_trainability: trainable
    classifier_version_expected: false
    output_fields:
      - field: supernnova_prob_class0
        type: probability
        description: SuperNNova P(SN Ia) — binary classifier
      - field: supernnova_prob_class1
        type: probability
        description: SuperNNova P(non-Ia) — complement
    expert_keys:
      - pittgoogle/supernnova_lsst
      - pittgoogle/supernnova_ztf
    notes: >
      Per-alert SuperNNova binary P(Ia) from BigQuery public datasets.
      LSST: pitt-alert-broker.lsst.supernnova
      ZTF: ardent-cycling-243415.ztf.SuperNNova
      Requires GCP credentials (service account or gcloud auth).
      Falls back to fixture if credentials absent.

  antares:
    phase: 1
    access: remote
    status: active
    public: true
    credentials_required: false  # public read API; login only for user filters
    client: antares-client
    base_url: https://antares.noirlab.edu
    semantic_type: mixed
    event_scope: alert
    temporal_exactness: exact_alert  # tags stored per locus history state
    historical_trainability: trainable
    classifier_version_expected: true
    output_fields:
      - classifier: ORACLE (Shah+ 2025)
        field: oracle_class
        type: probability
        classes: [SNIa, SN91bg, SNIax, SNII, SNIbc, SLSN-I, SLSN-II, IIn, IIb,
                  TDE, KN, AGN, uLens, CART, ILOT, PISN, Cep, RRLyr, EB]
        notes: Hierarchical 19-class GRU, per-alert tags with scores.
      - classifier: Superphot+ (de Soto+ 2024)
        field: superphot_plus_class
        type: probability
        classes: [SNIa, SNII, SNIbc, SNIIn, SLSN-I]
        notes: 5-class SN subtype; running on ZTF, LSST retrain in progress.
    expert_keys:
      - antares/oracle
      - antares/superphot_plus
    notes: >
      Query `loci_history` to retrieve the tag (and its score) at the exact
      alert that added it — this gives per-epoch semantics matching DEBASS's
      trust-training requirements.  Filter coverage expands per RTN-090.

  ampel:
    phase: 1
    access: remote
    status: active_with_caveats
    public: partial
    credentials_required: true  # AMPEL channel token (free via ampel-info@desy.de)
    client: requests (DESY REST)
    base_url: https://ampel.zeuthen.desy.de
    semantic_type: probability
    event_scope: alert
    temporal_exactness: exact_alert  # T2 documents are per-state (per-alert)
    historical_trainability: trainable
    classifier_version_expected: true
    output_fields:
      - classifier: T2MultiXGBClassifier (SNGuess)
        field: snguess_prob
        type: probability
        description: Binary young-extragalactic-transient probability.
      - classifier: T2RunParsnip (FollowMe / FinalBet)
        field: parsnip_probs
        type: probability
        classes: [SNIa, SNIax, 91bg, SNII, SNIbc, IIn, SLSN-I, TDE, KN, AGN,
                  uLens, CART, ILOT, PISN, non-SN]
        description: 14-class ParSNIP + rate/host priors.
    expert_keys:
      - ampel/snguess
      - ampel/parsnip_followme
    notes: >
      AMPEL stores all T2 results per-state, so retrieval of the classifier
      output at N=5 detections is native — cleanest per-epoch semantics of
      any Rubin community broker.  Archive access requires AMPEL_ARCHIVE_TOKEN.

  # Additional Phase 1a addition: Pitt-Google UPSILoN (periodic variable)
  # See pitt_google entry above for credentials/transport; UPSILoN rides the
  # same BigQuery backend.  Expert keys listed here for completeness:
  #   pittgoogle/upsilon_lsst
  #
  # The Rubin Community broker list (7 brokers) is now fully covered:
  #   alerce, fink, lasair, pitt_google, antares, ampel — plus babamul
  #   (skipped: babamul runs Superphot+ as an external filter, duplicating
  #    antares/superphot_plus).
